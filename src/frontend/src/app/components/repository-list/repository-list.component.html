<div class="repository-grid">
  
  <!-- Empty state -->
  <div *ngIf="(repositories$ | async)?.length === 0" class="empty-state">
    <mat-icon class="empty-icon">folder_off</mat-icon>
    <h2>No Repositories Found</h2>
    <p>Click "Scan Workspaces" to discover git repositories in your workspace directories.</p>
  </div>
  
  <!-- Repository cards -->
  <mat-card 
    *ngFor="let repo of repositories$ | async; trackBy: trackByPath"
    class="repository-card"
    (click)="onCardClick(repo)"
    [attr.data-testid]="'card-repository-' + repo.name">
    
    <mat-card-header>
      <mat-icon mat-card-avatar>folder</mat-icon>
      <mat-card-title>{{ repo.name }}</mat-card-title>
      <mat-card-subtitle>{{ repo.path }}</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <p *ngIf="repo.description" class="description">
        {{ repo.description }}
      </p>
      <p *ngIf="!repo.description" class="no-description">
        No description available
      </p>
      
      <!-- Tech stack badges -->
      <div *ngIf="repo.techStack && repo.techStack.length > 0" class="tech-stack gap-8">
        <mat-chip 
          *ngFor="let tech of repo.techStack"
          [color]="getTechColor(tech)"
          [attr.data-testid]="'badge-tech-' + tech">
          {{ tech }}
        </mat-chip>
      </div>
      
      <!-- Phase and status badges -->
      <div class="metadata gap-8">
        <mat-chip *ngIf="repo.phase" class="chip-phase">
          {{ repo.phase }}
        </mat-chip>
        <mat-chip *ngIf="repo.status" class="chip-status">
          {{ repo.status }}
        </mat-chip>
      </div>
    </mat-card-content>
    
  </mat-card>
  
</div>
