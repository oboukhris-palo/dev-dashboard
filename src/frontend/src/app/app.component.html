<mat-toolbar color="primary" class="toolbar">
  <img src="assets/palo-it-logo.png" alt="Palo IT" class="toolbar-logo" />
  <span class="toolbar-title">{{ title }}</span>
  
  <span class="toolbar-spacer"></span>
  
  <!-- Repository count badge -->
  @if (repositoriesCount$ | async; as count) {
    <span class="repository-count" data-testid="text-count-app">
      {{ count }} {{ count === 1 ? 'repository' : 'repositories' }}
    </span>
  }
  
  <!-- Scan button -->
  <button 
    mat-raised-button 
    class="scan-button"
    (click)="onScanClick()"
    [disabled]="loading$ | async"
    data-testid="btn-scan-app">
    <mat-icon>refresh</mat-icon>
    Scan Workspaces
  </button>
</mat-toolbar>

<div class="main-container p-24">
  
  <!-- Loading spinner -->
  @if (loading$ | async) {
    <div class="loading-container">
      <mat-spinner data-testid="spinner-loading-app"></mat-spinner>
      <p class="m-16">Scanning workspaces...</p>
    </div>
  }
  
  <!-- Error message -->
  @if (error$ | async; as error) {
    <div class="error-container p-16">
      <mat-icon color="warn">error</mat-icon>
      <p>{{ error }}</p>
    </div>
  }
  
  <!-- Repository list -->
  @if ((loading$ | async) === false) {
    <app-repository-list data-testid="list-repositories-app">
    </app-repository-list>
  }
  
</div>
