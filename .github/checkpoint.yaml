# ============================================================
# HANDOFF PROTOCOL (v2.0 - Chat-Based, No File Artifacts)
# ============================================================
# Handoff happens in CHAT CONVERSATION, not via files.
#
# To hand off work:
#   1. Post summary in chat with context (phase, epic, story, layer, cycle)
#   2. Next agent reads chat history above + this checkpoint.yaml
#   3. Next agent reads their .agent.md file for responsibilities
#   4. Next agent performs work based on chat context + role
#   5. New agent log created: /logs/{PHASE}/agent-{name}-YYYYMMDD.md
#
# Orchestrator Compass Protocol:
#   1. Read project_state → determine current phase + status
#   2. Read last_gate_passed → determine progression eligibility
#   3. Read orchestrator_decisions → understand decision history
#   4. Route to appropriate phase workflow based on state
#   5. Update checkpoint on phase transitions + gate outcomes
#
# FORBIDDEN: Creating handoff.json or tdd-execution.md files
# ============================================================
