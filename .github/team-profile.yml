# PM notes (INTERNAL ONLY)
pm_notes: |
  Project-specific observations and team dynamics notes.
  
  Example:
  - Sarah pairs well with Alex (mentorship)
  - Jordan needs 2 weeks ramp-up for C# syntax
  - Team works best with morning standup at 9:30 AM
  - Consider tech debt sprint every 4 sprints

# Usage Guidelines for PM
usage_guidelines: |
  1. **During Story Estimation**:
     - Look up team member skill_multiplier
     - Apply to context-adjusted estimate
     - NEVER copy developer names/levels to story YAML
  
  2. **Sprint Planning**:
     - Use availability.sprint_capacity_hours for capacity planning
     - Account for current_allocation_percentage
     - Check vacation_planned for conflicts
  
  3. **Retrospective**:
     - Update velocity.sprint_history after each sprint
     - Compare actual vs. estimated hours
     - Adjust skill_multiplier if consistent variance
  
  4. **Quarterly Review**:
     - Update experience.relevant_years
     - Re-assess proficiency scores
     - Recalibrate skill_multiplier based on velocity data
     - Document adjustments in multiplier_calibration
  
  5. **Privacy Rules**:
     - NEVER share this file with stakeholders
     - NEVER reference developer names/levels in user stories
     - Use anonymous skill factors in estimation documentation
     - Store in .gitignore for client repos
     - Keep in framework repo as reference template only

# Skill Multiplier Reference Table
multiplier_reference:
  SENIOR: 
    range: "0.8 - 0.9"
    description: "5+ years experience, expert in stack, quickly validates AI"
  
  MID:
    range: "1.0 - 1.1"
    description: "2-4 years experience, solid foundation, baseline"
  
  JUNIOR:
    range: "1.3 - 1.5"
    description: "0-2 years experience, learning curve, validation time"
  
  NEW_TO_STACK:
    range: "1.5 - 2.0"
    description: "Expert in other tech, new to this stack, ramp-up time"
  
  COMBINED_FACTORS:
    junior_new_stack: "1.4 × 1.6 = 2.24"
    description: "Junior developer completely new to tech stack"
