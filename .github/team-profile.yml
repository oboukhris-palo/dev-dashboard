# Team Profile - INTERNAL USE ONLY
# ⚠️ CRITICAL: This file contains team skill assessments and MUST NEVER be shared with stakeholders
# 
# Purpose: PM uses this to apply skill multipliers during story estimation
# Privacy: Add to .gitignore for client repos, keep in framework repo for reference only
# 
# Last Updated: [DATE]
# Maintained By: Project Manager / Dev-Lead

project:
  name: "[PROJECT_NAME]"
  tech_stack:
    primary_language: "[e.g., C#, TypeScript, Python]"
    framework: "[e.g., .NET 9, React, Django]"
    database: "[e.g., PostgreSQL, MongoDB]"
    cloud_platform: "[e.g., Azure, AWS, GCP]"

team_members:
  # Format: developer-id (never use in stakeholder docs)
  
  - id: "dev-001"
    # Note: Names are optional, use IDs in estimation calculations
    name: "[Full Name]"
    email: "[email@domain.com]"
    
    # Experience level
    experience:
      total_years: 0  # Total programming experience
      relevant_years: 0  # Years in current tech stack
      level: "SENIOR"  # SENIOR | MID | JUNIOR | NEW_TO_STACK
    
    # Tech stack proficiency (1-5 scale)
    proficiency:
      primary_language: 0  # 1-5: Beginner to Expert
      framework: 0
      database: 0
      cloud_platform: 0
      testing: 0
      devops: 0
    
    # Calculated skill multiplier (for PM estimation)
