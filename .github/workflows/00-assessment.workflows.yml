# 00-assessment.workflows.yml
# Assessment & Discovery — Phase 0
# Converted from 00-assessment.workflows.md (compact YAML, behaviour preserved)
# Load this file instead of the .md for agent context (saves ~80% PRU vs .md)
# Full detail reference: 00-assessment.workflows.md (archive)

workflow_id: ASSESSMENT-001
phase: "00-assessment"
name: "Assessment & Discovery"

metadata:
  pdlc_phase: "phase-0"
  output_location: "docs/00-assessment/"
  input_location: "docs/00-assessment/inputs/"
  handoff_to: "01-requirements.workflows.yml"
  agents: [orchestrator, architect, pm]
  log_path: "logs/00-assessment/agent-{name}-YYYYMMDD.md"
  quality_gate: ".github/gates/gate-00-assessment.md"
  applicable_project_types: [greenfield, brownfield, client-repo, microservice, experimental, local-dev]

# ── Conditions (branching based on framework-config.mjs) ─────────────────────
# NOTE: Phase 0 is largely type-agnostic. Condensed runs apply for experimental/local-dev.
conditions:
  experimental_or_local_dev:
    project_types: [experimental, local-dev]
    behaviour: "Skip Stages 2-4. Run only Stage 1 (Input Inventory) → quick baseline → handoff."
    stages_active: [stage_1]
  full_assessment:
    project_types: [greenfield, brownfield, client-repo, microservice]
    behaviour: "Run all 4 stages with full multi-dimensional analysis."
    stages_active: [stage_1, stage_2, stage_3, stage_4]

artifacts:
  templates:
    - .github/templates/prerequisites-tmpl.yml
    - .github/templates/recommendation-plan-tmpl.md
    - .github/templates/agent-log-tmpl.md
    - .github/templates/interview-synthesis-tmpl.md
    - .github/templates/documentation-synthesis-tmpl.md
    - .github/templates/input-conversion-metadata-tmpl.yml
    - .github/templates/decision-dashboard-tmpl.md
    - .github/templates/meeting-minutes-tmpl.yml
  gates:
    - .github/gates/gate-00-assessment.md
  guides:
    - .github/guides/gate-blocker-resolution.guide.md
  instructions:
    - .github/instructions/documentation.instructions.md
    - .github/instructions/framework-standards.instructions.md
    - .github/instructions/agent-logging.instructions.md
    - .github/instructions/ai.analysis.guardrails.instructions.md
  scripts:
    - .github/scripts/update-decision-trail.mjs
    - .github/scripts/generate-dashboard.mjs
  validation:
    - .github/validation/workflow-enforcer.md
    - .github/validation/enforcement-guide.md
    - .github/validation/workflow-compliance.yml

# ── Stages ────────────────────────────────────────────────────────────────────
stages:
  - id: stage_1
    name: "Client Context Discovery"
    phases: [1, 2]
    confidence_target: "30-50%"
    duration: "1-2 days"
    agents: [orchestrator, architect]
    steps:
      - id: input-inventory
        agent: orchestrator
        action: "Scan docs/00-assessment/inputs/ — catalog all client materials by category (code, docs, project mgmt, design, ops, interviews)"
        outputs: [inventory-technical.md, inventory-documentation.md, inventory-requirements.md, inventory-design.md, inventory-operations.md, inventory-stakeholder.md]
      - id: baseline-assessment
        agent: architect
        action: "Rapid assessment from available inputs — technology landscape, team/process, current challenges"
        outputs: [baseline-assessment.md]
        confidence: "30-50%"
      - id: prerequisites-generation
        agent: orchestrator
        action: "Gap analysis vs ideal requirements → generate prerequisites-request.yml using prerequisites-tmpl.yml → stakeholder email"
        template: ".github/templates/prerequisites-tmpl.yml"
        outputs: [docs/00-assessment/prerequisites-request.yml]

  - id: stage_2
    name: "Prerequisites Fulfillment"
    phases: [3]
    confidence_target: "60-70%"
    duration: "5-15 days"
    agents: [orchestrator]
    if: "project_type NOT IN [experimental, local-dev]"
    steps:
      - id: prerequisites-tracking
        agent: orchestrator
        action: "Weekly check-ins on access provisioning. Update prerequisites-request.yml status (REQUESTED → GRANTED). Test each access."
        outputs: [access-validation-report.md]
      - id: compliance-review
        agent: orchestrator
        action: "Validate PAT management, data governance, compliance frameworks (GDPR/SOC2/HIPAA/ISO 27001)"
        outputs: [compliance-clearance.md]
      - id: context-enrichment
        agent: architect
        action: "Re-scan with full access. Update baseline confidence from 30-50% → 60-70%."
        outputs: [enriched-baseline.md]

  - id: stage_3
    name: "Multi-Dimensional Assessment"
    phases: [4, 5]
    confidence_target: "80-90%"
    duration: "5-10 days"
    agents: [architect, pm]
    if: "project_type NOT IN [experimental, local-dev]"
    dimensions:
      - id: dim_1  name: "Documentation Quality & Coverage"        score_range: "0.0-3.0"
      - id: dim_2  name: "Governance & Compliance"                 score_range: "0.0-3.0"
      - id: dim_3  name: "Architecture & Technical Design"         score_range: "0.0-3.0"
      - id: dim_4  name: "Ways of Working (SDLC/DevOps)"          score_range: "0.0-3.0"
      - id: dim_5  name: "Compliance & Security Posture"           score_range: "0.0-3.0"
      - id: dim_6  name: "Tooling, Observability & Testing"        score_range: "0.0-3.0"
      - id: dim_7  name: "Product Management & Performance"        score_range: "0.0-3.0"
      - id: dim_8  name: "AI Context & AI-First Readiness"         score_range: "0.0-3.0"
    scoring:
      "0.0-1.0": "Critical gaps — foundational work required"
      "1.0-2.0": "Developing — improvement opportunities"
      "2.0-3.0": "Strong maturity — optimization potential"
    confidence_stars:
      "5/5 (90-100%)": "Direct observation, verified data"
      "4/5 (70-89%)":  "Strong evidence, minor assumptions"
      "3/5 (50-69%)":  "Partial evidence, reasonable inferences"
      "2/5 (30-49%)":  "Limited evidence, significant assumptions"
      "1/5 (<30%)":    "Speculation — requires validation"
    steps:
      - id: multi-dimensional-analysis
        agent: architect
        action: "Score all 8 dimensions. Use evidence-based scoring only (no speculation). Document evidence sources."
        ref: "00-assessment.workflows.md#Phase-4 for full scoring criteria"
        outputs: [multi-dimensional-assessment.md]
      - id: stakeholder-interviews
        agent: pm
        action: "Conduct stakeholder interviews. Process transcripts using interview-synthesis-tmpl.md."
        if: "interviews available in docs/00-assessment/inputs/interviews/"
        outputs: [interview-synthesis-*.md]
      - id: gap-analysis
        agent: architect
        action: "Compare current state vs AI-first delivery readiness. Identify top 5 critical gaps."
        outputs: [gap-analysis.md]

  - id: stage_4
    name: "Strategic Planning & Handoff"
    phases: [6]
    confidence_target: "80-90%"
    duration: "2-3 days"
    agents: [architect, orchestrator]
    if: "project_type NOT IN [experimental, local-dev]"
    steps:
      - id: ai-readiness-report
        agent: architect
        action: "Generate AI readiness report. Include maturity tier classification, routing recommendation (Route A/B/C/D), transformation roadmap."
        ref: ".github/templates/recommendation-plan-tmpl.md"
        outputs: [docs/00-assessment/ai-readiness-report.md]
      - id: routing-decision
        agent: orchestrator
        action: |
          Determine handoff route based on maturity tier:
          - Route A (Tier 1): Documentation-rich → standard PDLC phases 1-7
          - Route B (Tier 2-3): Functional extraction → epic/story mining first
          - Route C (Tier 3-4): Interview-driven → discovery-first approach
          - Route D (Mixed): Hybrid assembly from available inputs
        outputs: [routing-decision recorded in checkpoint.yaml]
      - id: decision-dashboard
        agent: orchestrator
        action: "Generate decision dashboard. Run update-decision-trail.mjs."
        scripts: [.github/scripts/update-decision-trail.mjs, .github/scripts/generate-dashboard.mjs]

# ── Phase Exit ────────────────────────────────────────────────────────────────
exit:
  gate: ".github/gates/gate-00-assessment.md"
  pass_criteria:
    - "Prerequisites ≥90% fulfilled"
    - "Maturity tier classified"
    - "Readiness report approved"
    - "Routing strategy documented"
  on_pass: "Proceed to 01-requirements.workflows.yml"
  on_conditional: "Document conditions; proceed with restrictions"
  on_fail: "BLOCK — see .github/guides/gate-blocker-resolution.guide.md"

# ── Agent logging ─────────────────────────────────────────────────────────────
logging:
  mandatory: true
  template: ".github/templates/agent-log-tmpl.md"
  paths:
    orchestrator: "logs/00-assessment/agent-orchestrator-YYYYMMDD.md"
    architect:    "logs/00-assessment/agent-architect-YYYYMMDD.md"
    pm:           "logs/00-assessment/agent-pm-YYYYMMDD.md"

# ── Checkpoint update ─────────────────────────────────────────────────────────
checkpoint:
  on_entry:      "current_phase: '00-assessment', phase_status: 'in_progress'"
  on_report_done: "add 'gate-00-assessment' to decision_gates_pending"
  on_gate_pass:  "last_gate_passed: 'gate-00-assessment', phase_status: 'complete', routing_strategy: <route>"

status: ACTIVE
version: "3.0"
last_updated: "2026-05-22"
