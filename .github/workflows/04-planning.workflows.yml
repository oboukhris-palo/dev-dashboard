# 04-planning.workflows.yml
# Planning & Deployment Workflow — Phases 6-7
# Converted from 04-planning.workflows.md (compact YAML, behaviour preserved)

workflow_id: PLANNING-001
phase: "04-planning"
name: "Planning & Deployment (Phases 6-7)"

metadata:
  pdlc_phases: [6, 7]
  output_location: "docs/04-planning/"
  input: "03-testing gate passed"
  handoff_to: "05-implementation.workflows.yml"
  agents: [pm, po, architect, dev-lead]
  log_path: "logs/04-planning/agent-{name}-YYYYMMDD.md"
  quality_gate: ".github/gates/gate-04-planning.md"

# ── Conditions (branching based on framework-config.mjs) ─────────────────────
conditions:
  tdd_mode_on:
    flag: "config.development_modes.tddMode == true"
    behaviour: "Dev-Lead creates implementation plans with explicit RED/GREEN/REFACTOR layer assignments. BDD feature files linked per layer."
    affected_steps: [dev-lead-bdd-integration, dev-lead-sprint-planning]
  bdd_mode_on:
    flag: "config.development_modes.bddMode == true"
    behaviour: "Dev-Lead sets up BDD feature file structure per story before sprint start. BA validates feature file completeness."
    affected_steps: [dev-lead-bdd-integration]
  bdd_mode_off:
    flag: "config.development_modes.bddMode == false"
    behaviour: "Dev-Lead creates implementation plans without BDD scaffolding. Unit test specs are developer-defined."
    affected_steps: [dev-lead-bdd-integration]
    modification: "dev-lead-bdd-integration step is SKIPPED."
  ddd_mode_on:
    flag: "config.development_modes.dddMode == true"
    behaviour: "Sprint planning includes aggregate/domain-event layer assignments. Architect reviews sprint scope for DDD compliance."
    affected_steps: [dev-lead-sprint-planning]
  experimental_or_local_dev:
    project_types: [experimental, local-dev]
    behaviour: "Skip formal planning. Create a simple task list / TODO.md. No deployment plan required."
    stages_active: [stage_6_lightweight]

artifacts:
  templates:
    - .github/templates/agent-log-tmpl.md
    - .github/templates/gate-report-tmpl.md
    - .github/templates/implementation-plan-tmpl.md
    - .github/templates/user-story-tmpl.yml
    - .github/templates/sprint-planning-tmpl.md
    - .github/templates/dependency-matrix-tmpl.md
    - .github/templates/change-management-tmpl.md
    - .github/templates/monitoring-setup-tmpl.md
    - .github/templates/executive-status-report-tmpl.md
    - .github/templates/project-status-tmpl.md
    - .github/templates/decision-entry-tmpl.md
    - .github/templates/meeting-minutes-tmpl.yml
  gates:
    - .github/gates/gate-04-planning.md
  guides:
    - .github/guides/gate-blocker-resolution.guide.md
    - .github/guides/tdd-enforcement.guide.md
  instructions:
    - .github/instructions/estimation.instructions.md
    - .github/instructions/documentation.instructions.md
    - .github/instructions/agent-logging.instructions.md
    - .github/instructions/framework-standards.instructions.md
    - .github/instructions/git-workflow.instructions.md
  scripts:
    - .github/scripts/update-decision-trail.mjs

output_structure:
  "docs/04-planning/iteration-planning.md": "Sprint/iteration schedule, MVP phasing"
  "docs/04-planning/deployment-plan.md":    "Deployment strategy and rollback procedures"
  "docs/04-planning/dependency-graph.md":   "Story interdependencies"
  "docs/04-planning/resource-plan.md":      "Team assignments (anonymized)"
  "docs/04-planning/risk-register.md":      "Identified risks + mitigations"
  "docs/04-planning/success-criteria.md":   "KPIs and measurement approach"

# ── Stages ────────────────────────────────────────────────────────────────────
stages:
  - id: stage_6_lightweight
    name: "Lightweight Task List (experimental/local-dev)"
    if: "project_type IN [experimental, local-dev]"
    steps:
      - id: dev-lead-task-list
        agent: dev-lead
        action: "Create TODO.md with task breakdown by domain. No formal sprint planning required."
        outputs: ["TODO.md"]

  - id: stage_6
    name: "Deployment & Monitoring Strategy"
    if: "project_type NOT IN [experimental, local-dev]"
    inputs: ["All Stage 1-5 docs", "requirements.md", "business-case.md"]
    outputs: ["iteration-planning.md"]
    agents: [po, pm, architect]
    steps:
      - id: po-iteration-planning
        agent: po
        action: "Define MVP vs phased rollout. Sequence feature releases. Create iteration-planning.md."
        outputs: ["docs/04-planning/iteration-planning.md"]
      - id: architect-deployment
        agent: architect
        action: "Deployment architecture — environments (dev/staging/prod), rollback procedures, blue-green or canary strategy."
        outputs: ["docs/04-planning/deployment-plan.md"]
      - id: pm-deployment-coordination
        agent: pm
        action: "Deployment logistics, team coordination, release windows."
      - id: po-monitoring-feedback
        agent: po
        action: "Define monitoring metrics (business + technical). Feedback loop strategy."
    approval_gate:
      criteria:
        - "Release phases sequenced"
        - "MVP identified"
        - "Deployment architecture sound"
        - "Monitoring covers business/technical metrics"
        - "Feedback loop defined"

  - id: stage_7
    name: "Development & Testing Execution Planning"
    if: "project_type NOT IN [experimental, local-dev]"
    agents: [dev-lead, pm]
    steps:
      - id: dev-lead-sprint-planning
        agent: dev-lead
        action_base: "Plan sprint scope. Create implementation plans per user story using implementation-plan-tmpl.md."
        action_tdd_addon: "Assign RED/GREEN/REFACTOR layer checkboxes per story layer. Estimate TDD cycle count."
        action_ddd_addon: "Include aggregate/domain-event assignments in layer breakdown."
        template: ".github/templates/implementation-plan-tmpl.md"
      - id: dev-lead-bdd-integration
        agent: dev-lead
        if_flag: "bddMode"
        action_when_on:  "Set up BDD feature file structure per story. Link .feature files in implementation plan. Verify BA coverage before sprint."
        action_when_off: "SKIPPED — bddMode is off."
      - id: pm-resource-planning
        agent: pm
        action: "Confirm team availability, validate sprint feasibility against estimates."
        outputs: ["docs/04-planning/resource-plan.md"]

# ── Phase Exit ────────────────────────────────────────────────────────────────
exit:
  gate: ".github/gates/gate-04-planning.md"
  pass_criteria:
    - "All stories have estimates populated"
    - "Deployment plan approved"
    - "Sprint 1 scope defined and feasible"
    - "Implementation plans created (if tddMode=true: with layer checkboxes)"
    - "BDD feature files linked in plans (if bddMode=true)"
  on_pass: "Proceed to 05-implementation.workflows.yml"
  on_conditional: "Resolve scheduling conflicts; re-run gate within 1 day"
  on_fail: "BLOCK — see .github/guides/gate-blocker-resolution.guide.md"

logging:
  mandatory: true
  template: ".github/templates/agent-log-tmpl.md"
  paths:
    pm:           "logs/04-planning/agent-pm-YYYYMMDD.md"
    po:           "logs/04-planning/agent-po-YYYYMMDD.md"
    architect:    "logs/04-planning/agent-architect-YYYYMMDD.md"
    dev-lead:     "logs/04-planning/agent-dev-lead-YYYYMMDD.md"
    orchestrator: "logs/04-planning/agent-orchestrator-YYYYMMDD.md"

checkpoint:
  on_entry:        "current_phase: '04-planning', phase_status: 'in_progress'"
  on_plans_created: "add 'gate-planning' to decision_gates_pending"
  on_gate_pass:    "last_gate_passed: 'gate-planning', phase_status: 'complete', next_expected_gate: 'plan-approval'"

status: ACTIVE
version: "3.0"
last_updated: "2026-05-22"
